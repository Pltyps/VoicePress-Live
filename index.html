<!DOCTYPE html>
<html>
  <head>
    <title>Upload Video for Transcription</title>
  </head>
  <body>
    <h2>Upload Your MP4 File</h2>
    <form id="uploadForm">
      <input type="file" id="videoFile" accept="video/mp4" required />
      <button type="submit">Upload</button>
    </form>
    <p id="status"></p>

    <script src="upload.js"></script>
  </body>
</html>
